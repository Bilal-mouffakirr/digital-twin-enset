<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --panel-bg:  #161b22;
    --border:    #2a3547;
    --green:     #00d1b2;
    --blue:      #3b82f6;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --muted:     #8fa3bf;
    --text:      #e8edf5;
    --cell-ok:   #1a3a4a;
    --cell-warn: #3a2a0a;
    --cell-err:  #3a0a0a;
    --cell-line: #00d1b2;
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px 16px 30px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 18px rgba(0,209,178,0.45);
  }

  .subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  /* ═══════════════════════════════════════
     CONTROLS
  ═══════════════════════════════════════ */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 22px;
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover, .btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,209,178,0.08);
    box-shadow: 0 0 10px rgba(0,209,178,0.2);
  }
  .btn.warn-btn.active  { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.08); }
  .btn.err-btn.active   { border-color: var(--red);   color: var(--red);   background: rgba(239,68,68,0.08); }

  /* ═══════════════════════════════════════
     3D SCENE WRAPPER
  ═══════════════════════════════════════ */
  .scene-wrap {
    perspective: 900px;
    perspective-origin: 50% 38%;
    margin-bottom: 22px;
  }

  .panel-3d {
    position: relative;
    width: 440px;
    height: 280px;
    transform-style: preserve-3d;
    transform: rotateX(28deg) rotateY(-18deg) rotateZ(0deg);
    transition: transform 0.9s cubic-bezier(0.25,0.8,0.25,1);
    cursor: grab;
  }
  .panel-3d:active { cursor: grabbing; }

  /* ── FRONT FACE ── */
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
  }

  .face-front {
    background: linear-gradient(135deg, #0a1520 0%, #0d2035 60%, #0a1520 100%);
    border: 1.5px solid #1e3a50;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      inset 0 0 40px rgba(0,150,200,0.06),
      0 0 0 1px rgba(0,209,178,0.08);
  }

  /* ── BACK FACE ── */
  .face-back {
    background: linear-gradient(135deg, #1a1208 0%, #2a1e0a 100%);
    border: 1.5px solid #3a2e10;
    border-radius: 6px;
    transform: translateZ(-22px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--amber);
    letter-spacing: 0.12em;
  }

  /* ── EDGE: bottom ── */
  .face-bottom {
    position: absolute;
    width: 440px;
    height: 22px;
    background: linear-gradient(180deg, #162030, #0c1520);
    border: 1px solid #1e3a50;
    bottom: -22px;
    left: 0;
    transform: rotateX(-90deg);
    transform-origin: top center;
  }
  /* ── EDGE: right ── */
  .face-right {
    position: absolute;
    width: 22px;
    height: 280px;
    background: linear-gradient(90deg, #1a2e40, #0e1e2c);
    border: 1px solid #1e3a50;
    right: -22px;
    top: 0;
    transform: rotateY(90deg);
    transform-origin: left center;
  }

  /* ═══════════════════════════════════════
     SOLAR CELL GRID
  ═══════════════════════════════════════ */
  .cell-grid {
    position: absolute;
    inset: 14px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 5px;
  }

  .cell {
    border-radius: 3px;
    background: var(--cell-ok);
    border: 1px solid rgba(0,209,178,0.18);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.4s, box-shadow 0.4s, border-color 0.4s;
  }

  /* cell internal grid lines (busbars) */
  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent calc(33% - 0.5px),
        rgba(0,209,178,0.12) calc(33% - 0.5px),
        rgba(0,209,178,0.12) calc(33% + 0.5px),
        transparent calc(33% + 0.5px)
      ),
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent calc(50% - 0.5px),
        rgba(0,209,178,0.10) calc(50% - 0.5px),
        rgba(0,209,178,0.10) calc(50% + 0.5px),
        transparent calc(50% + 0.5px)
      );
    pointer-events: none;
  }

  /* Shimmer / light reflection */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.04) 0%,
      transparent 60%
    );
    pointer-events: none;
  }

  .cell.ok {
    background: var(--cell-ok);
    border-color: rgba(0,209,178,0.22);
  }
  .cell.ok:hover {
    background: #1e4a5a;
    box-shadow: 0 0 10px rgba(0,209,178,0.35);
    border-color: var(--green);
    z-index: 2;
  }

  .cell.warn {
    background: var(--cell-warn);
    border-color: rgba(245,158,11,0.45);
    box-shadow: 0 0 8px rgba(245,158,11,0.25);
    animation: pulse-warn 2s ease-in-out infinite;
  }

  .cell.err {
    background: var(--cell-err);
    border-color: rgba(239,68,68,0.6);
    box-shadow: 0 0 12px rgba(239,68,68,0.4);
    animation: pulse-err 1.4s ease-in-out infinite;
  }

  @keyframes pulse-warn {
    0%,100% { box-shadow: 0 0 6px rgba(245,158,11,0.2); }
    50%      { box-shadow: 0 0 16px rgba(245,158,11,0.55); }
  }
  @keyframes pulse-err {
    0%,100% { box-shadow: 0 0 8px rgba(239,68,68,0.35); }
    50%      { box-shadow: 0 0 20px rgba(239,68,68,0.75); }
  }

  /* Cell label on hover */
  .cell-label {
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.42rem;
    letter-spacing: 0.06em;
    color: rgba(0,209,178,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cell:hover .cell-label { opacity: 1; }

  /* ── Panel overlay glow on defect ── */
  .panel-glow {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    pointer-events: none;
    transition: box-shadow 0.5s;
  }
  .glow-ok   { box-shadow: inset 0 0 30px rgba(0,209,178,0.04); }
  .glow-warn { box-shadow: inset 0 0 40px rgba(245,158,11,0.12), 0 0 30px rgba(245,158,11,0.15); }
  .glow-err  { box-shadow: inset 0 0 40px rgba(239,68,68,0.15),  0 0 30px rgba(239,68,68,0.25); }

  /* ── Panel frame rails ── */
  .frame-h {
    position: absolute;
    left: 0; right: 0; height: 14px;
    background: linear-gradient(180deg, #2a4060, #1a2e45);
    border-bottom: 1px solid rgba(0,209,178,0.15);
  }
  .frame-h.bottom { top: auto; bottom: 0; border-bottom: none; border-top: 1px solid rgba(0,209,178,0.15); }
  .frame-v {
    position: absolute;
    top: 0; bottom: 0; width: 14px;
    background: linear-gradient(90deg, #2a4060, #1a2e45);
    border-right: 1px solid rgba(0,209,178,0.15);
  }
  .frame-v.right { left: auto; right: 0; border-right: none; border-left: 1px solid rgba(0,209,178,0.15); }

  /* Junction box */
  .jbox {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 38px;
    height: 20px;
    background: #0e1a24;
    border: 1px solid #2a4060;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.48rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ═══════════════════════════════════════
     STATUS BAR
  ═══════════════════════════════════════ */
  .status-bar {
    width: 460px;
    max-width: 96vw;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
  }
  .stat-lbl {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .ok-color   { color: var(--green); }
  .warn-color { color: var(--amber); }
  .err-color  { color: var(--red);   }

  /* ═══════════════════════════════════════
     TOOLTIP
  ═══════════════════════════════════════ */
  .tooltip {
    position: fixed;
    background: #0d1117ee;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.7rem;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    min-width: 130px;
    backdrop-filter: blur(8px);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip strong { color: var(--green); display: block; margin-bottom: 4px; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; }

  /* ═══════════════════════════════════════
     LEGEND
  ═══════════════════════════════════════ */
  .legend {
    display: flex;
    gap: 20px;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
  }

  /* ═══════════════════════════════════════
     DRAG HINT
  ═══════════════════════════════════════ */
  .drag-hint {
    font-size: 0.62rem;
    color: rgba(139,163,191,0.45);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }
</style>
</head>
<body>

<h1>☀ PV PANEL — DIGITAL TWIN</h1>
<p class="subtitle">Cell Amrecan OS-P72-330W · 12 panneaux · Mohammedia</p>

<!-- Controls -->
<div class="controls">
  <button class="btn active" id="btn-ok"   onclick="setMode('ok')">✅ Normal</button>
  <button class="btn warn-btn" id="btn-warn" onclick="setMode('warn')">⚠️ Défaut partiel</button>
  <button class="btn err-btn"  id="btn-err"  onclick="setMode('err')">❌ Panne critique</button>
  <button class="btn" id="btn-reset" onclick="resetAll()">🔄 Reset</button>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="stat">
    <span class="stat-val ok-color" id="s-power">330 W</span>
    <span class="stat-lbl">Puissance</span>
  </div>
  <div class="stat">
    <span class="stat-val ok-color" id="s-eff">17.0%</span>
    <span class="stat-lbl">Rendement</span>
  </div>
  <div class="stat">
    <span class="stat-val ok-color" id="s-cells">24/24</span>
    <span class="stat-lbl">Cellules OK</span>
  </div>
  <div class="stat">
    <span class="stat-val ok-color" id="s-status">NOMINAL</span>
    <span class="stat-lbl">Statut</span>
  </div>
</div>

<!-- 3D Panel -->
<div class="scene-wrap">
  <div class="panel-3d" id="panel3d">

    <!-- Back face -->
    <div class="face face-back">JUNCTION BOX · REAR SIDE</div>

    <!-- Edge faces -->
    <div class="face face-bottom"></div>
    <div class="face face-right"></div>

    <!-- Front face -->
    <div class="face face-front" id="faceFront">
      <!-- Aluminium frame rails -->
      <div class="frame-h"></div>
      <div class="frame-h bottom"></div>
      <div class="frame-v"></div>
      <div class="frame-v right"></div>

      <!-- Cell grid (6×4 = 24 cells) -->
      <div class="cell-grid" id="cellGrid"></div>

      <!-- Junction box label -->
      <div class="jbox">J-BOX</div>

      <!-- Overlay glow -->
      <div class="panel-glow glow-ok" id="panelGlow"></div>
    </div>

  </div>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#1a3a4a;border:1px solid rgba(0,209,178,0.4)"></div>Normal
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#3a2a0a;border:1px solid rgba(245,158,11,0.5)"></div>Défaut
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#3a0a0a;border:1px solid rgba(239,68,68,0.6)"></div>Panne
  </div>
</div>
<p class="drag-hint">⟳ Glisser pour faire pivoter · Cliquer sur une cellule pour inspecter</p>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <strong id="tt-title">C1-1</strong>
  <div id="tt-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CELL DATA MODEL
// ═══════════════════════════════════════════════════════
const ROWS = 4, COLS = 6, TOTAL = ROWS * COLS;

// Each cell: { state: 'ok'|'warn'|'err', temp: °C, Voc: mV, Isc: mA }
const cells = Array.from({ length: TOTAL }, (_, i) => ({
  id: i,
  row: Math.floor(i / COLS),
  col: i % COLS,
  state: 'ok',
  temp: 38 + Math.random() * 4,
  Voc:  620 + Math.random() * 10,
  Isc:  8900 + Math.random() * 200,
}));

let currentMode = 'ok';
let defectCells = new Set();

// ── Build cell DOM ──────────────────────────────────────
const grid = document.getElementById('cellGrid');
const tooltip = document.getElementById('tooltip');

cells.forEach((cell) => {
  const el = document.createElement('div');
  el.className = 'cell ok';
  el.dataset.id = cell.id;

  const lbl = document.createElement('div');
  lbl.className = 'cell-label';
  lbl.textContent = `R${cell.row+1}C${cell.col+1}`;
  el.appendChild(lbl);

  el.addEventListener('click', () => toggleCellDefect(cell.id, el));
  el.addEventListener('mousemove', (e) => showTooltip(e, cell.id));
  el.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });

  grid.appendChild(el);
  cell.el = el;
});

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
function showTooltip(e, id) {
  const cell = cells[id];
  const stateLabel = { ok: '✅ Normal', warn: '⚠️ Défaut', err: '❌ Panne' }[cell.state];
  const stateColor = { ok: '#00d1b2', warn: '#f59e0b', err: '#ef4444' }[cell.state];

  document.getElementById('tt-title').textContent = `Cellule R${cell.row+1}C${cell.col+1}`;
  document.getElementById('tt-title').style.color = stateColor;
  document.getElementById('tt-body').innerHTML = `
    <div style="color:${stateColor};margin-bottom:4px">${stateLabel}</div>
    <div>🌡 Temp  : <b>${cell.temp.toFixed(1)} °C</b></div>
    <div>⚡ Voc   : <b>${cell.Voc.toFixed(0)} mV</b></div>
    <div>🔋 Isc   : <b>${cell.Isc.toFixed(0)} mA</b></div>
  `;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
  tooltip.classList.add('visible');
}

// ═══════════════════════════════════════════════════════
// CELL CLICK: cycle state ok → warn → err → ok
// ═══════════════════════════════════════════════════════
function toggleCellDefect(id, el) {
  const cell = cells[id];
  const cycle = { ok: 'warn', warn: 'err', err: 'ok' };
  cell.state = cycle[cell.state];

  // Adjust electrical values to simulate defect
  if (cell.state === 'warn') {
    cell.Voc = 580 + Math.random() * 20;
    cell.Isc = 7200 + Math.random() * 400;
    cell.temp = 52 + Math.random() * 8;
  } else if (cell.state === 'err') {
    cell.Voc = 200 + Math.random() * 100;
    cell.Isc = 1500 + Math.random() * 800;
    cell.temp = 68 + Math.random() * 15;
  } else {
    cell.Voc = 620 + Math.random() * 10;
    cell.Isc = 8900 + Math.random() * 200;
    cell.temp = 38 + Math.random() * 4;
  }

  el.className = 'cell ' + cell.state;
  updateStats();
}

// ═══════════════════════════════════════════════════════
// MODE BUTTONS (mass-apply defects)
// ═══════════════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  ['ok','warn','err'].forEach(m => {
    document.getElementById('btn-' + m)?.classList.toggle('active', m === mode);
  });

  defectCells.clear();

  if (mode === 'ok') {
    cells.forEach(c => {
      c.state = 'ok';
      c.Voc = 620 + Math.random() * 10;
      c.Isc = 8900 + Math.random() * 200;
      c.temp = 38 + Math.random() * 4;
      c.el.className = 'cell ok';
    });
  } else if (mode === 'warn') {
    // Random 4–6 warn cells
    const n = 4 + Math.floor(Math.random() * 3);
    const shuffled = [...cells].sort(() => Math.random() - 0.5).slice(0, n);
    cells.forEach(c => { c.state = 'ok'; c.el.className = 'cell ok'; });
    shuffled.forEach(c => {
      c.state = 'warn';
      c.Voc  = 580 + Math.random() * 20;
      c.Isc  = 7200 + Math.random() * 400;
      c.temp = 52 + Math.random() * 8;
      c.el.className = 'cell warn';
    });
  } else if (mode === 'err') {
    // 2–3 err + some warn
    const errN = 2 + Math.floor(Math.random() * 2);
    const warnN = 3 + Math.floor(Math.random() * 2);
    const shuffled = [...cells].sort(() => Math.random() - 0.5);
    cells.forEach(c => { c.state = 'ok'; c.el.className = 'cell ok'; });
    shuffled.slice(0, errN).forEach(c => {
      c.state = 'err';
      c.Voc  = 200 + Math.random() * 100;
      c.Isc  = 1500 + Math.random() * 800;
      c.temp = 68 + Math.random() * 15;
      c.el.className = 'cell err';
    });
    shuffled.slice(errN, errN + warnN).forEach(c => {
      c.state = 'warn';
      c.Voc  = 580 + Math.random() * 20;
      c.Isc  = 7200 + Math.random() * 400;
      c.temp = 52 + Math.random() * 8;
      c.el.className = 'cell warn';
    });
  }

  updateStats();
  updateGlow();
}

function resetAll() { setMode('ok'); }

// ═══════════════════════════════════════════════════════
// STATS UPDATE
// ═══════════════════════════════════════════════════════
function updateStats() {
  const okCount   = cells.filter(c => c.state === 'ok').length;
  const warnCount = cells.filter(c => c.state === 'warn').length;
  const errCount  = cells.filter(c => c.state === 'err').length;

  // Power derating: warn → -8%, err → -35% per cell
  const nominalW = 330;
  const derate = (warnCount * 0.08 + errCount * 0.35) / TOTAL;
  const power  = Math.max(0, nominalW * (1 - derate));
  const eff    = (17.0 * (1 - derate)).toFixed(1);

  const sp = document.getElementById('s-power');
  const se = document.getElementById('s-eff');
  const sc = document.getElementById('s-cells');
  const ss = document.getElementById('s-status');

  sp.textContent = power.toFixed(0) + ' W';
  se.textContent = eff + '%';
  sc.textContent = okCount + '/24';

  // Color coding
  const color = errCount > 0 ? 'err-color' : warnCount > 0 ? 'warn-color' : 'ok-color';
  [sp, se, sc, ss].forEach(el => {
    el.className = 'stat-val ' + color;
  });

  if (errCount > 0)       ss.textContent = 'DÉFAUT CRITIQUE';
  else if (warnCount > 0) ss.textContent = 'DÉFAUT PARTIEL';
  else                    ss.textContent = 'NOMINAL';

  updateGlow();
}

function updateGlow() {
  const glow = document.getElementById('panelGlow');
  const errCount  = cells.filter(c => c.state === 'err').length;
  const warnCount = cells.filter(c => c.state === 'warn').length;

  glow.className = 'panel-glow ' +
    (errCount > 0 ? 'glow-err' : warnCount > 0 ? 'glow-warn' : 'glow-ok');
}

// ═══════════════════════════════════════════════════════
// DRAG TO ROTATE (mouse + touch)
// ═══════════════════════════════════════════════════════
const panel = document.getElementById('panel3d');
let isDragging = false;
let lastX = 0, lastY = 0;
let rotX = 28, rotY = -18;

function applyRotation() {
  panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}

panel.addEventListener('mousedown', e => {
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  panel.style.transition = 'none';
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  rotY += dx * 0.45;
  rotX -= dy * 0.45;
  rotX = Math.max(-60, Math.min(60, rotX));
  lastX = e.clientX;
  lastY = e.clientY;
  applyRotation();
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    panel.style.transition = 'transform 0.6s cubic-bezier(0.25,0.8,0.25,1)';
  }
});

// Touch support
panel.addEventListener('touchstart', e => {
  isDragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  panel.style.transition = 'none';
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  rotY += dx * 0.45;
  rotX -= dy * 0.45;
  rotX = Math.max(-60, Math.min(60, rotX));
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  applyRotation();
}, { passive: true });

document.addEventListener('touchend', () => {
  isDragging = false;
  panel.style.transition = 'transform 0.6s cubic-bezier(0.25,0.8,0.25,1)';
});

// ═══════════════════════════════════════════════════════
// AUTO-BREATHE ANIMATION (subtle slow rotation)
// ═══════════════════════════════════════════════════════
let breatheAngle = 0;
let breatheDir   = 1;
function breathe() {
  if (!isDragging) {
    breatheAngle += 0.012 * breatheDir;
    if (Math.abs(breatheAngle) > 3) breatheDir *= -1;
    panel.style.transform = `rotateX(${rotX}deg) rotateY(${rotY + breatheAngle}deg)`;
  }
  requestAnimationFrame(breathe);
}
breathe();

// ── Init ────────────────────────────────────────────────
updateStats();
</script>
</body>
</html>
